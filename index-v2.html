const fmt = (n) => n != null ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n) : '$0';

    return { bank: bank.name, jan: d?.jan || { c: 0, v: 0 }, dec: d?.dec || { c: 0, v: 0 }, tier: bank.tier };
  });
}

function getGroupAvg(field) {
  const allDealerTotals = DEALER_NAMES.map(name => {
    return BANK_DATA.reduce((s, b) => {
      const d = b.dealers.find(dd => dd.name === name);
      return s + (d?.[field]?.c || 0);
    }, 0);
  });
  return allDealerTotals.reduce((s,v) => s + v, 0) / DEALER_NAMES.length;
}

// ─── TIER LOOKUP HELPER ─────────────────────────────────────────────────────
function getTierForBank(bankName, annualVolume) {
  if (bankName === "Chase") {
    for (let i = CHASE_TIERS.length - 1; i >= 0; i--) {
      if (annualVolume >= (i === 0 ? 0 : CHASE_TIERS[i-1].threshold)) {
        return {
          tierIndex: i,
          totalTiers: CHASE_TIERS.length,
          current: CHASE_TIERS[i],
          next: i < CHASE_TIERS.length - 1 ? CHASE_TIERS[i+1] : null,
          currentPayout: CHASE_TIERS[i].payout,
          nextPayout: i < CHASE_TIERS.length - 1 ? CHASE_TIERS[i+1].payout : CHASE_TIERS[i].payout,
        };
      }
    }
    return { tierIndex: 0, totalTiers: CHASE_TIERS.length, current: CHASE_TIERS[0], next: CHASE_TIERS[1], currentPayout: CHASE_TIERS[0].payout, nextPayout: CHASE_TIERS[1].payout };
  }
  if (bankName === "Bank of America") {
    for (let i = BOFA_TIERS.length - 1; i >= 0; i--) {
      if (annualVolume >= (i === 0 ? 0 : BOFA_TIERS[i-1].threshold)) {
        const estPayout = Math.round(BOFA_TIERS[i].bps * 35000);
        const nextPayout = i < BOFA_TIERS.length - 1 ? Math.round(BOFA_TIERS[i+1].bps * 35000) : estPayout;
        return {
          tierIndex: i,
          totalTiers: BOFA_TIERS.length,
          current: BOFA_TIERS[i],
          next: i < BOFA_TIERS.length - 1 ? BOFA_TIERS[i+1] : null,
          currentPayout: estPayout,
          nextPayout: nextPayout,
        };
      }
    }
    const estPayout = Math.round(BOFA_TIERS[0].bps * 35000);
    return { tierIndex: 0, totalTiers: BOFA_TIERS.length, current: BOFA_TIERS[0], next: BOFA_TIERS[1], currentPayout: estPayout, nextPayout: Math.round(BOFA_TIERS[1].bps * 35000) };
  }
  // Santander - flat rate
  return { tierIndex: 0, totalTiers: 1, current: { label: "Flat Rate", payout: 80 }, next: null, currentPayout: 80, nextPayout: 80 };
}

// ─── COMPUTE GROUP STATS FOR RANKING ─────────────────────────────────────────
function computeGroupStats(group, excludeSubvented) {
  let totalC = 0, totalV = 0, totalDecC = 0, totalDecV = 0, excludedCount = 0;
  const bankStats = {};
  Object.entries(group.banks).forEach(([bankName, b]) => {
    const sub = excludeSubvented ? (b.subvented || 0) : 0;
    excludedCount += sub;
    const adjC = b.janC - sub;
    const adjV = b.janV - sub * Math.round(b.janV / Math.max(b.janC, 1));
    totalC += adjC;
    totalV += adjV;
    totalDecC += b.decC;
    totalDecV += b.decV;
    const annualized = adjV * 12;
    const tier = getTierForBank(bankName, annualized);
    // Projection
    const projectedMonthV = Math.round(adjV / CURRENT_DAY * DAYS_IN_MONTH);
    const projectedAnnualV = projectedMonthV * 12;
    const projectedTier = getTierForBank(bankName, projectedAnnualV);
    // Progress toward next tier
    let progress = 1;
    if (tier.next) {
      const currentThreshold = tier.tierIndex === 0 ? 0 : (bankName === "Chase" ? CHASE_TIERS[tier.tierIndex - 1].threshold : BOFA_TIERS[tier.tierIndex - 1].threshold);
      const nextThreshold = bankName === "Chase" ? CHASE_TIERS[tier.tierIndex].threshold : BOFA_TIERS[tier.tierIndex].threshold;
      progress = Math.min((annualized - currentThreshold) / (nextThreshold - currentThreshold), 1);
    }
    bankStats[bankName] = { ...b, adjC, adjV, annualized, tier, projectedTier, projectedMonthV, progress };
  });
  const penetration = totalC / group.totalRetailJan;
  const prevPenetration = totalDecC / group.totalRetailDec;
  const penDelta = (penetration - prevPenetration) * 100; // in percentage points
  const totalVDelta = totalDecV > 0 ? (totalV - totalDecV) / totalDecV : 0;
  return { ...group, totalC, totalV, totalDecC, totalDecV, penetration, prevPenetration, penDelta, totalVDelta, bankStats, excludedCount };
}

// Chart colors that must be literal (not CSS vars) for Chart.js canvas rendering
function chartC(theme) {
  return theme === 'light'
    ? { tick: '#666666', tickDim: '#999999', grid: '#E5E5E5', legend: '#555555' }
    : { tick: '#A0A0A0', tickDim: '#666', grid: '#222', legend: '#A0A0A0' };
}

// ─── SHARED COMPONENTS ───────────────────────────────────────────────────────
function DeltaBadge({ current, previous, suffix = "" }) {
  const d = delta(current, previous);
  const isPos = d >= 0;
  const color = isPos ? "var(--positive)" : "var(--negative)";
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: '2px', fontSize: '0.75rem', fontWeight: 600, color }}>
      {isPos ? <IconArrowUp /> : <IconArrowDown />}
      {Math.abs(d).toFixed(1)}%{suffix}
    </span>
  );
}

function KPICard({ icon, label, value, subValue, current, previous, accent }) {
  return (
    <div style={{ background: accent ? 'linear-gradient(135deg, rgba(204,255,0,0.12), rgba(204,255,0,0.04))' : 'var(--bg-surface)', borderRadius: '12px', padding: '20px 24px', border: accent ? '1px solid rgba(204,255,0,0.3)' : '1px solid var(--border)', flex: '1 1 200px', minWidth: '200px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '12px' }}>
        <div style={{ color: 'var(--accent)' }}>{icon}</div>
        <span style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{label}</span>
      </div>
      <div style={{ fontSize: '1.75rem', fontWeight: 700, lineHeight: 1.1, marginBottom: '4px' }}>{value}</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
        {subValue && <span style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>{subValue}</span>}
        {current != null && previous != null && <DeltaBadge current={current} previous={previous} suffix=" MoM" />}
      </div>
    </div>
  );
}

function SectionTitle({ children, subtitle }) {
  return (
    <div style={{ marginBottom: '16px' }}>
      <h2 style={{ fontSize: '1.15rem', fontWeight: 700, letterSpacing: '-0.01em' }}>{children}</h2>
      {subtitle && <p style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '2px' }}>{subtitle}</p>}
    </div>
  );
}

function ChartCanvas({ id, initChart, deps = [] }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = initChart(ctx);
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, deps);
  return <canvas ref={canvasRef} id={id} />;
}

const thStyle = { padding: '10px 12px', textAlign: 'left', fontSize: '0.75rem', fontWeight: 600, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.04em' };
const tdStyle = { padding: '10px 12px', color: 'var(--text-primary)' };

// VIEW: MY DEALERSHIP
// ═══════════════════════════════════════════════════════════════════════════════
function MyDealershipView({ selectedDealer, onDealerChange, theme }) {
  const cc = chartC(theme);
  const data = getDealerData(selectedDealer);
  const totalJanC = data.reduce((s, d) => s + d.jan.c, 0);
  const totalDecC = data.reduce((s, d) => s + d.dec.c, 0);
  const totalJanV = data.reduce((s, d) => s + d.jan.v, 0);
  const totalDecV = data.reduce((s, d) => s + d.dec.v, 0);
  const groupAvgContracts = getGroupAvg('jan');

  // Payout estimate for this dealer
  const janPayout = data.reduce((s, d) => s + (d.jan.c * d.tier.currentPayout), 0);

  // Action items
  const actions = [];
  data.forEach(d => {
    if (d.jan.c === 0 && d.dec.c > 0) {
      actions.push({ type: 'dropped', msg: `${d.bank}: Dropped from ${d.dec.c} contracts to 0 this month`, severity: 'negative' });
    } else if (d.jan.c === 0 && d.dec.c === 0) {
      actions.push({ type: 'inactive', msg: `${d.bank}: No activity — opportunity to start sending deals`, severity: 'warning' });
    } else if (d.jan.v > 0 && d.dec.v > 0 && d.jan.v < d.dec.v * 0.5) {
      actions.push({ type: 'declining', msg: `${d.bank}: Volume down ${Math.round((1 - d.jan.v / d.dec.v) * 100)}% (${fmtK(d.dec.v)} to ${fmtK(d.jan.v)})`, severity: 'negative' });
    }
  });
  // Positive callouts
  data.forEach(d => {
    if (d.jan.c > 0 && d.dec.c === 0) {
      actions.push({ type: 'new', msg: `${d.bank}: New activity this month — ${d.jan.c} contracts`, severity: 'positive' });
    } else if (d.jan.v > 0 && d.dec.v > 0 && d.jan.v > d.dec.v * 1.3) {
      actions.push({ type: 'growing', msg: `${d.bank}: Volume up ${Math.round((d.jan.v / d.dec.v - 1) * 100)}% — strong momentum`, severity: 'positive' });
    }
  });

  return (
    <div>
      {/* Dealer Selector */}
      <div style={{ marginBottom: '24px', display: 'flex', alignItems: 'center', gap: '12px' }}>
        <span style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Viewing:</span>
        <select value={selectedDealer} onChange={e => onDealerChange(e.target.value)}>
          {DEALER_NAMES.map(d => <option key={d} value={d}>{d}</option>)}
        </select>
      </div>

      {/* KPIs */}
      <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap', marginBottom: '32px' }}>
        <KPICard icon={<IconChart />} label="Your Contracts" value={fmtNum(totalJanC)} subValue={`prev: ${fmtNum(totalDecC)}`} current={totalJanC} previous={totalDecC} />
        <KPICard icon={<IconDollar />} label="Your Volume" value={fmtK(totalJanV)} subValue={`prev: ${fmtK(totalDecV)}`} current={totalJanV} previous={totalDecV} />
        <KPICard icon={<IconWallet />} label="Est. Payout This Month" value={fmt(janPayout)} accent={true} />
        <KPICard icon={<IconUsers />} label="vs. Group Average" value={`${totalJanC > groupAvgContracts ? '+' : ''}${(totalJanC - groupAvgContracts).toFixed(1)}`} subValue={`group avg: ${groupAvgContracts.toFixed(1)} contracts`} />
      </div>

      {/* Bank Breakdown */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '24px' }}>
        <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)' }}>
          <SectionTitle>Your Volume by Lender</SectionTitle>
          <div style={{ height: '240px' }}>
            <ChartCanvas id={`myDealer-vol-${selectedDealer}-${theme}`} deps={[selectedDealer, theme]} initChart={(ctx) => new Chart(ctx, {
              type: 'bar',
              data: {
                labels: data.map(d => d.bank),
                datasets: [
                  { label: 'Jan 2026', data: data.map(d => d.jan.v), backgroundColor: '#CCFF00', borderRadius: 4 },
                  { label: 'Dec 2025', data: data.map(d => d.dec.v), backgroundColor: 'rgba(204,255,0,0.25)', borderRadius: 4 },
                ]
              },
              options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'top', labels: { color: cc.legend, font: { family: 'Inter', size: 11 } } } },
                scales: {
                  x: { ticks: { color: cc.tick, font: { family: 'Inter', size: 11 } }, grid: { display: false } },
                  y: { ticks: { color: cc.tickDim, font: { family: 'Inter', size: 10 }, callback: v => fmtK(v) }, grid: { color: cc.grid } }
                }
              }
            })} />
          </div>
        </div>

        {/* Detail Table */}
        <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)' }}>
          <SectionTitle>Lender Detail</SectionTitle>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.8rem' }}>
            <thead>
              <tr style={{ borderBottom: '1px solid var(--border)' }}>
                <th style={thStyle}>Lender</th>
                <th style={{...thStyle, textAlign: 'right'}}>Jan Contracts</th>
                <th style={{...thStyle, textAlign: 'right'}}>Jan Volume</th>
                <th style={{...thStyle, textAlign: 'right'}}>Payout/Contract</th>
                <th style={{...thStyle, textAlign: 'right'}}>Est. Earned</th>
              </tr>
            </thead>
            <tbody>
              {data.map(d => (
                <tr key={d.bank} style={{ borderBottom: '1px solid rgba(51,51,51,0.5)' }}>
                  <td style={{...tdStyle, fontWeight: 600}}>{d.bank}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{d.jan.c || '—'}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{d.jan.v > 0 ? fmtK(d.jan.v) : '—'}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{fmt(d.tier.currentPayout)}</td>
                  <td style={{...tdStyle, textAlign: 'right', color: d.jan.c > 0 ? 'var(--accent)' : 'var(--text-tertiary)', fontWeight: 600}}>
                    {d.jan.c > 0 ? fmt(d.jan.c * d.tier.currentPayout) : '—'}
                  </td>
                </tr>
              ))}
              <tr style={{ borderTop: '2px solid var(--border)' }}>
                <td style={{...tdStyle, fontWeight: 700}}>Total</td>
                <td style={{...tdStyle, textAlign: 'right', fontWeight: 700}}>{totalJanC}</td>
                <td style={{...tdStyle, textAlign: 'right', fontWeight: 700}}>{fmtK(totalJanV)}</td>
                <td style={tdStyle}></td>
                <td style={{...tdStyle, textAlign: 'right', fontWeight: 700, color: 'var(--accent)'}}>{fmt(janPayout)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {/* Action Items */}
      {actions.length > 0 && (
        <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)' }}>
          <SectionTitle subtitle="Based on your month-over-month activity">Actions & Insights</SectionTitle>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
            {actions.map((a, i) => {
              const colors = { negative: { bg: 'rgba(248,113,113,0.08)', border: 'rgba(248,113,113,0.2)', text: 'var(--negative)' }, warning: { bg: 'rgba(251,191,36,0.08)', border: 'rgba(251,191,36,0.2)', text: 'var(--warning)' }, positive: { bg: 'rgba(74,222,128,0.08)', border: 'rgba(74,222,128,0.2)', text: 'var(--positive)' } };
              const c = colors[a.severity];
              return (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '10px 14px', background: c.bg, borderRadius: '8px', border: `1px solid ${c.border}` }}>
                  <span style={{ color: c.text }}>{a.severity === 'positive' ? <IconTrendUp /> : <IconAlert />}</span>
                  <span style={{ fontSize: '0.85rem' }}>{a.msg}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// VIEW: YOUR MONEY
// ═══════════════════════════════════════════════════════════════════════════════
function YourMoneyView({ theme }) {
  // Current monthly earnings by bank at current tier
  const bankEarnings = BANK_DATA.map(bank => {
    const earned = bank.jan.contracts * bank.tier.currentPayout;
    const nextEarned = bank.tier.nextTier !== "n/a" ? bank.jan.contracts * bank.tier.nextPayout : earned;
    const annualProjectedContracts = bank.jan.contracts * 12;
    const annualEarnedCurrent = annualProjectedContracts * bank.tier.currentPayout;
    const annualEarnedNext = bank.tier.nextTier !== "n/a" ? annualProjectedContracts * bank.tier.nextPayout : annualEarnedCurrent;
    return {
      bank: bank.name,
      contracts: bank.jan.contracts,
      currentTier: bank.tier.current,
      currentPayout: bank.tier.currentPayout,
      nextTier: bank.tier.nextTier,
      nextPayout: bank.tier.nextPayout,
      earnedThisMonth: earned,
      couldEarnThisMonth: nextEarned,
      leftOnTable: nextEarned - earned,
      annualCurrent: annualEarnedCurrent,
      annualNext: annualEarnedNext,
      annualDelta: annualEarnedNext - annualEarnedCurrent,
    };
  });

  const totalEarned = bankEarnings.reduce((s, b) => s + b.earnedThisMonth, 0);
  const totalCould = bankEarnings.reduce((s, b) => s + b.couldEarnThisMonth, 0);
  const totalLeftOnTable = totalCould - totalEarned;
  const totalAnnualCurrent = bankEarnings.reduce((s, b) => s + b.annualCurrent, 0);
  const totalAnnualNext = bankEarnings.reduce((s, b) => s + b.annualNext, 0);

  return (
    <div>
      {/* Big Money KPIs */}
      <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap', marginBottom: '32px' }}>
        <KPICard icon={<IconWallet />} label="Earned This Month" value={fmt(totalEarned)} accent={true} subValue="at current tier rates" />
        <KPICard icon={<IconTarget />} label="At Next Tier" value={fmt(totalCould)} subValue="if all banks hit next tier" />
        <KPICard icon={<IconTrendUp />} label="Opportunity Gap" value={fmt(totalLeftOnTable)} subValue="additional per month at next tier" />
        <KPICard icon={<IconDollar />} label="Annual Projection" value={fmtK(totalAnnualCurrent)} subValue={`could be ${fmtK(totalAnnualNext)}`} />
      </div>

      {/* Per-Bank Earnings Breakdown */}
      <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)', marginBottom: '24px' }}>
        <SectionTitle subtitle="What you earned vs. what you'd earn at the next tier">Earnings by Lender</SectionTitle>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
          {bankEarnings.map(b => (
            <div key={b.bank} style={{ background: 'var(--bg-surface-2)', borderRadius: '10px', padding: '20px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '12px' }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: '1rem', marginBottom: '2px' }}>{b.bank}</div>
                  <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>{b.contracts} contracts this month at {fmt(b.currentPayout)}/contract</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: '1.25rem', fontWeight: 700, color: 'var(--accent)' }}>{fmt(b.earnedThisMonth)}</div>
                  <div style={{ fontSize: '0.75rem', color: 'var(--text-tertiary)' }}>earned this month</div>
                </div>
              </div>

              {b.nextTier !== "n/a" && (
                <div style={{ background: 'var(--bg-surface-3)', borderRadius: '8px', padding: '14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div>
                    <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', marginBottom: '2px' }}>
                      At <strong style={{ color: 'var(--text-primary)' }}>{b.nextTier}</strong> tier ({fmt(b.nextPayout)}/contract):
                    </div>
                    <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>
                      Same {b.contracts} contracts would pay <strong style={{ color: 'var(--accent)' }}>{fmt(b.couldEarnThisMonth)}</strong>
                    </div>
                  </div>
                  {b.leftOnTable > 0 && (
                    <div style={{ background: 'rgba(204,255,0,0.1)', border: '1px solid rgba(204,255,0,0.25)', borderRadius: '8px', padding: '8px 14px', textAlign: 'center' }}>
                      <div style={{ fontSize: '1rem', fontWeight: 700, color: 'var(--accent)' }}>+{fmt(b.leftOnTable)}</div>
                      <div style={{ fontSize: '0.65rem', color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>per month</div>
                    </div>
                  )}
                </div>
              )}
              {b.nextTier === "n/a" && (
                <div style={{ fontSize: '0.8rem', color: 'var(--text-tertiary)', fontStyle: 'italic' }}>Flat-rate program — no tiers</div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Tier Grids Reference */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
        <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)' }}>

                    <td style={{...tdStyle, fontWeight: isCurrent ? 700 : 400}}>
                      {isCurrent && <span style={{ color: 'var(--accent)', marginRight: '6px' }}>&#9654;</span>}

                    <td style={{...tdStyle, textAlign: 'right'}}>{fmt(t.payout)}</td>

          <SectionTitle subtitle="BPS-based commission by volume tier">BofA Incentive Grid</SectionTitle>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.8rem' }}>
            <thead>
              <tr style={{ borderBottom: '1px solid var(--border)' }}>
                <th style={thStyle}>Volume Tier</th>
                <th style={{...thStyle, textAlign: 'right'}}>BPS</th>
                <th style={{...thStyle, textAlign: 'right'}}>Est. per $35K contract</th>

            </thead>

                  <tr key={i} style={{ borderBottom: '1px solid rgba(51,51,51,0.5)', background: isCurrent ? 'rgba(204,255,0,0.06)' : 'transparent' }}>
                    <td style={{...tdStyle, fontWeight: isCurrent ? 700 : 400}}>
                      {isCurrent && <span style={{ color: 'var(--accent)', marginRight: '6px' }}>&#9654;</span>}
                      {t.label}
                    </td>
                    <td style={{...tdStyle, textAlign: 'right'}}>{(t.bps * 10000).toFixed(0)} bps</td>
                    <td style={{...tdStyle, textAlign: 'right'}}>{fmt(Math.round(t.bps * 35000))}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

                scales: {
                  x: { title: { display: true, text: 'Total Volume', color: cc.tickDim, font: { family: 'Inter', size: 11 } }, ticks: { color: cc.tickDim, font: { family: 'Inter', size: 10 }, callback: v => fmtK(v) }, grid: { color: cc.grid } },
                  y: { title: { display: true, text: 'Avg Reserve/Unit', color: cc.tickDim, font: { family: 'Inter', size: 11 } }, ticks: { color: cc.tickDim, font: { family: 'Inter', size: 10 }, callback: v => fmt(v) }, grid: { color: cc.grid } }
                }
              }
            })} />
          </div>
        </div>
      </div>

      {/* Full Economics Table */}
      <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)', marginBottom: '24px', overflow: 'auto' }}>
        <SectionTitle subtitle="Side-by-side lender economics — where is the money?">Per-Deal Economics by Lender</SectionTitle>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.8rem' }}>
          <thead>
            <tr style={{ borderBottom: '2px solid var(--border)' }}>
              <th style={thStyle}>Lender</th>
              <th style={{...thStyle, textAlign: 'right'}}>Units</th>
              <th style={{...thStyle, textAlign: 'right'}}>Avg Deal Size</th>
              <th style={{...thStyle, textAlign: 'right'}}>Avg Reserve/Unit</th>
              <th style={{...thStyle, textAlign: 'right'}}>Avg Sell Rate</th>
              <th style={{...thStyle, textAlign: 'right'}}>Avg Rate Spread</th>
              <th style={{...thStyle, textAlign: 'right'}}>Avg Term (mo)</th>
              <th style={{...thStyle, textAlign: 'right'}}>Avg F&I PRU</th>
              <th style={{...thStyle, textAlign: 'right'}}>Total F&I Income</th>
            </tr>
          </thead>
          <tbody>
            {FINANCED_DEALS_BY_BANK.filter(b => b.volume > 0).sort((a,b) => b.avgFiPru - a.avgFiPru).map(b => {
              const bestReserve = Math.max(...withData.map(x => x.avgReserve));
              const isBestReserve = b.avgReserve === bestReserve;
              return (
                <tr key={b.name} style={{ borderBottom: '1px solid rgba(51,51,51,0.5)' }}>
                  <td style={{...tdStyle, fontWeight: 600}}>{b.name}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{b.units}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{fmt(Math.round(b.volume / b.units))}</td>
                  <td style={{...tdStyle, textAlign: 'right', color: isBestReserve ? 'var(--accent)' : 'inherit', fontWeight: isBestReserve ? 700 : 400}}>{b.avgReserve > 0 ? fmt(b.avgReserve) : '—'}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{b.avgSellRate > 0 ? fmtPct(b.avgSellRate) : '—'}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{b.avgSpread > 0 ? b.avgSpread.toFixed(2) + '%' : '—'}</td>

                  <td style={{...tdStyle, textAlign: 'right', fontWeight: 600}}>{b.avgFiPru > 0 ? fmt(b.avgFiPru) : '—'}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{b.totalFi > 0 ? fmt(b.totalFi) : '—'}</td>

      </div>

      {/* Insight Card */}
      <div style={{ background: 'linear-gradient(135deg, rgba(204,255,0,0.08), rgba(0,212,255,0.05))', borderRadius: '12px', padding: '24px', border: '1px solid rgba(204,255,0,0.2)' }}>
        <SectionTitle>Key Takeaway</SectionTitle>
        <p style={{ fontSize: '0.9rem', color: 'var(--text-secondary)', lineHeight: 1.6 }}>
          {(() => {
            const best = withData.sort((a,b) => b.avgFiPru - a.avgFiPru)[0];
            const worst = withData.sort((a,b) => a.avgFiPru - b.avgFiPru)[0];
            return `${best.name} delivers the highest F&I PRU at ${fmt(best.avgFiPru)}/unit with an average reserve of ${fmt(best.avgReserve)}. ` +
              `By comparison, ${worst.name} yields ${fmt(worst.avgFiPru)}/unit — a spread of ${fmt(best.avgFiPru - worst.avgFiPru)} per deal. ` +
              `Shifting volume toward higher-margin lenders can materially improve per-unit economics across the group.`;
          })()}
        </p>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// VIEW: OVERVIEW (ENHANCED with Dealer Group Performance)
// ═══════════════════════════════════════════════════════════════════════════════
function OverviewView({ theme, excludeSubvented }) {
  const cc = chartC(theme);
  const totalJanVol = BANK_DATA.reduce((s,b) => s + b.jan.financed, 0);
  const totalDecVol = BANK_DATA.reduce((s,b) => s + b.dec.financed, 0);
  const totalJanC = BANK_DATA.reduce((s,b) => s + b.jan.contracts, 0);
  const totalDecC = BANK_DATA.reduce((s,b) => s + b.dec.contracts, 0);

  const [sortCol, setSortCol] = useState('penetration');
  const [sortDir, setSortDir] = useState('desc');

  const groupStats = useMemo(() => {
    return DEALER_GROUPS.map(g => computeGroupStats(g, excludeSubvented));
  }, [excludeSubvented]);

  const sortedGroups = useMemo(() => {
    const sorted = [...groupStats];
    sorted.sort((a, b) => {
      let aVal, bVal;
      switch (sortCol) {
        case 'name': aVal = a.name; bVal = b.name; return sortDir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
        case 'rooftops': aVal = a.rooftops; bVal = b.rooftops; break;
        case 'penetration': aVal = a.penetration; bVal = b.penetration; break;
        case 'chasePen': aVal = (a.bankStats['Chase']?.adjC || 0) / a.totalRetailJan; bVal = (b.bankStats['Chase']?.adjC || 0) / b.totalRetailJan; break;
        case 'bofaPen': aVal = (a.bankStats['Bank of America']?.adjC || 0) / a.totalRetailJan; bVal = (b.bankStats['Bank of America']?.adjC || 0) / b.totalRetailJan; break;
        case 'santanderPen': aVal = (a.bankStats['Santander']?.adjC || 0) / a.totalRetailJan; bVal = (b.bankStats['Santander']?.adjC || 0) / b.totalRetailJan; break;
        case 'penDelta': aVal = a.penDelta; bVal = b.penDelta; break;
        case 'contracts': aVal = a.totalC; bVal = b.totalC; break;
        case 'volume': aVal = a.totalV; bVal = b.totalV; break;
        default: aVal = a.penetration; bVal = b.penetration;
      }
      return sortDir === 'asc' ? aVal - bVal : bVal - aVal;
    });
    return sorted;
  }, [groupStats, sortCol, sortDir]);

  const handleSort = (col) => {
    if (sortCol === col) {
      setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    } else {
      setSortCol(col);
      setSortDir('desc');
    }
  };

  const sortIndicator = (col) => sortCol === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';

  // Build anomaly flags
  const anomalies = useMemo(() => {
    const flags = [];
    groupStats.forEach(g => {
      if (g.penDelta < -2) {
        flags.push({ severity: 'red', group: g.name, msg: `${g.name}: Penetration dropped ${Math.abs(g.penDelta).toFixed(1)}pp MoM`, action: 'Verify F&I manager status — check for staffing changes or training gaps' });
      }
      if (g.totalVDelta < -0.3) {
        flags.push({ severity: 'red', group: g.name, msg: `${g.name}: Volume down ${Math.abs(g.totalVDelta * 100).toFixed(0)}% MoM`, action: 'Review lender program awareness — schedule dealer visit' });
      }
      if (g.totalVDelta > 0.3) {
        flags.push({ severity: 'yellow', group: g.name, msg: `${g.name}: Volume up ${(g.totalVDelta * 100).toFixed(0)}% MoM — verify deal quality`, action: 'Audit recent submissions for compliance' });
      }
    });
    return flags;
  }, [groupStats]);

  return (
    <div>
      <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap', marginBottom: '32px' }}>
        <KPICard icon={<IconDollar />} label="Financed Volume" value={fmtK(totalJanVol)} subValue={`prev: ${fmtK(totalDecVol)}`} current={totalJanVol} previous={totalDecVol} />
        <KPICard icon={<IconChart />} label="Contracts Financed" value={fmtNum(totalJanC)} subValue={`prev: ${fmtNum(totalDecC)}`} current={totalJanC} previous={totalDecC} />
        <KPICard icon={<IconUsers />} label="Total Retail" value={fmtNum(TOTAL_RETAIL_JAN)} subValue={`prev: ${fmtNum(TOTAL_RETAIL_DEC)}`} current={TOTAL_RETAIL_JAN} previous={TOTAL_RETAIL_DEC} />
        <KPICard icon={<IconTarget />} label="Lender Penetration" value={fmtPct(totalJanC / TOTAL_RETAIL_JAN)} subValue={`prev: ${fmtPct(totalDecC / TOTAL_RETAIL_DEC)}`} current={totalJanC / TOTAL_RETAIL_JAN} previous={totalDecC / TOTAL_RETAIL_DEC} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '32px' }}>
        <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)' }}>
          <SectionTitle subtitle="Contracts financed through lender partners">Volume by Bank</SectionTitle>
          <div style={{ height: '280px' }}>
            <ChartCanvas id={`volByBank-${theme}`} deps={[theme]} initChart={(ctx) => new Chart(ctx, {
              type: 'bar',
              data: {
                labels: BANK_DATA.map(b => b.name),
                datasets: [
                  { label: 'Jan 2026', data: BANK_DATA.map(b => b.jan.financed), backgroundColor: '#CCFF00', borderRadius: 4 },
                  { label: 'Dec 2025', data: BANK_DATA.map(b => b.dec.financed), backgroundColor: 'rgba(204,255,0,0.25)', borderRadius: 4 },
                ]
              },
              options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'top', labels: { color: cc.legend, font: { family: 'Inter', size: 11 } } } },
                scales: {
                  x: { ticks: { color: cc.tick, font: { family: 'Inter', size: 11 } }, grid: { display: false } },
                  y: { ticks: { color: cc.tickDim, font: { family: 'Inter', size: 11 }, callback: v => fmtK(v) }, grid: { color: cc.grid } }
                }
              }
            })} />
          </div>
        </div>
        <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)' }}>
          <SectionTitle subtitle="Share of financed contracts by lender">Contract Distribution</SectionTitle>
          <div style={{ height: '280px', display: 'flex', justifyContent: 'center' }}>
            <ChartCanvas id={`contractDist-${theme}`} deps={[theme]} initChart={(ctx) => new Chart(ctx, {
              type: 'doughnut',
              data: {
                labels: BANK_DATA.map(b => b.name),
                datasets: [{ data: BANK_DATA.map(b => b.jan.contracts), backgroundColor: ['#CCFF00', '#00D4FF', '#FF6B6B'], borderWidth: 0, spacing: 3 }]
              },
              options: {
                responsive: true, maintainAspectRatio: false, cutout: '65%',
                plugins: {
                  legend: { position: 'bottom', labels: { color: cc.legend, font: { family: 'Inter', size: 12 }, padding: 16 } },
                  tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.parsed} contracts (${fmtPct(ctx.parsed / totalJanC)})` } }
                }
              }
            })} />
          </div>
        </div>
      </div>

      <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)', marginBottom: '32px' }}>
        <SectionTitle subtitle="Dealers with zero contracts or significant declines">Non-Activity & Trend Alerts</SectionTitle>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
          {BANK_DATA.map(bank => {
            const inactive = bank.dealers.filter(d => d.jan.c === 0 && d.dec.c === 0);
            const dropped = bank.dealers.filter(d => d.jan.c === 0 && d.dec.c > 0);
            const declining = bank.dealers.filter(d => d.jan.c > 0 && d.dec.c > 0 && d.jan.v < d.dec.v * 0.5);
            return (
              <React.Fragment key={bank.name}>
                {inactive.length > 0 && (
                  <div style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '10px 14px', background: 'rgba(251,191,36,0.08)', borderRadius: '8px', border: '1px solid rgba(251,191,36,0.2)' }}>
                    <span style={{ color: 'var(--warning)' }}><IconAlert /></span>
                    <span style={{ fontSize: '0.85rem' }}><strong style={{ color: 'var(--warning)' }}>{bank.name}</strong> — {inactive.length} dealer{inactive.length > 1 ? 's' : ''} with zero activity both months: {inactive.map(d => d.name).join(', ')}</span>
                  </div>
                )}
                {dropped.length > 0 && (
                  <div style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '10px 14px', background: 'rgba(248,113,113,0.08)', borderRadius: '8px', border: '1px solid rgba(248,113,113,0.2)' }}>
                    <span style={{ color: 'var(--negative)' }}><IconAlert /></span>
                    <span style={{ fontSize: '0.85rem' }}><strong style={{ color: 'var(--negative)' }}>{bank.name}</strong> — {dropped.length} dealer{dropped.length > 1 ? 's' : ''} dropped to zero in Jan: {dropped.map(d => `${d.name} (was ${d.dec.c} contracts)`).join(', ')}</span>
                  </div>
                )}
                {declining.length > 0 && (
                  <div style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '10px 14px', background: 'rgba(248,113,113,0.06)', borderRadius: '8px', border: '1px solid rgba(248,113,113,0.15)' }}>
                    <span style={{ color: 'var(--negative)', opacity: 0.7 }}><IconArrowDown /></span>
                    <span style={{ fontSize: '0.85rem' }}><strong style={{ color: 'var(--text-secondary)' }}>{bank.name}</strong> — Significant volume decline: {declining.map(d => `${d.name} (${fmtK(d.dec.v)} → ${fmtK(d.jan.v)})`).join(', ')}</span>
                  </div>
                )}
              </React.Fragment>
            );
          })}
        </div>
      </div>

      {/* ─── Dealer Group Performance Table ─── */}
      <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)', marginBottom: '32px', overflow: 'auto' }}>
        <SectionTitle subtitle="Lender penetration and volume across all managed dealer groups">Dealer Group Performance</SectionTitle>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.78rem' }}>
          <thead>
            <tr style={{ borderBottom: '2px solid var(--border)' }}>
              <th className="sortable-th" style={thStyle} onClick={() => handleSort('name')}>Group Name{sortIndicator('name')}</th>
              <th className="sortable-th" style={{...thStyle, textAlign: 'right'}} onClick={() => handleSort('rooftops')}>Rooftops{sortIndicator('rooftops')}</th>
              <th className="sortable-th" style={{...thStyle, textAlign: 'right'}} onClick={() => handleSort('penetration')}>Overall Pen %{sortIndicator('penetration')}</th>
              <th className="sortable-th" style={{...thStyle, textAlign: 'right'}} onClick={() => handleSort('chasePen')}>Chase Pen %{sortIndicator('chasePen')}</th>
              <th className="sortable-th" style={{...thStyle, textAlign: 'right'}} onClick={() => handleSort('bofaPen')}>BofA Pen %{sortIndicator('bofaPen')}</th>
              <th className="sortable-th" style={{...thStyle, textAlign: 'right'}} onClick={() => handleSort('santanderPen')}>Santander Pen %{sortIndicator('santanderPen')}</th>
              <th className="sortable-th" style={{...thStyle, textAlign: 'right'}} onClick={() => handleSort('penDelta')}>MoM Change (pp){sortIndicator('penDelta')}</th>
              <th className="sortable-th" style={{...thStyle, textAlign: 'right'}} onClick={() => handleSort('contracts')}>Contracts{sortIndicator('contracts')}</th>
              <th className="sortable-th" style={{...thStyle, textAlign: 'right'}} onClick={() => handleSort('volume')}>Volume{sortIndicator('volume')}</th>
            </tr>
          </thead>
          <tbody>
            {sortedGroups.map(g => {
              const chasePen = (g.bankStats['Chase']?.adjC || 0) / g.totalRetailJan;
              const bofaPen = (g.bankStats['Bank of America']?.adjC || 0) / g.totalRetailJan;
              const santPen = (g.bankStats['Santander']?.adjC || 0) / g.totalRetailJan;
              const penDropBig = g.penDelta < -2;
              return (
                <tr key={g.name} style={{ borderBottom: '1px solid rgba(51,51,51,0.4)', background: g.name === DEALER_GROUP ? 'rgba(204,255,0,0.04)' : 'transparent' }}>
                  <td style={{...tdStyle, fontWeight: g.name === DEALER_GROUP ? 700 : 500}}>{g.name}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{g.rooftops}</td>
                  <td style={{...tdStyle, textAlign: 'right', fontWeight: 600}}>{fmtPct(g.penetration)}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{fmtPct(chasePen)}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{fmtPct(bofaPen)}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{fmtPct(santPen)}</td>
                  <td style={{...tdStyle, textAlign: 'right', color: penDropBig ? 'var(--negative)' : (g.penDelta >= 0 ? 'var(--positive)' : 'var(--text-secondary)'), fontWeight: penDropBig ? 700 : 400}}>
                    {g.penDelta >= 0 ? '+' : ''}{g.penDelta.toFixed(1)}pp
                  </td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{fmtNum(g.totalC)}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{fmtK(g.totalV)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* ─── Anomaly Flags ─── */}
      {anomalies.length > 0 && (
        <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)' }}>
          <SectionTitle subtitle="Automated alerts based on month-over-month group performance">Anomaly Flags</SectionTitle>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
            {anomalies.map((a, i) => {
              const isRed = a.severity === 'red';
              const bg = isRed ? 'rgba(248,113,113,0.08)' : 'rgba(251,191,36,0.08)';
              const border = isRed ? 'rgba(248,113,113,0.2)' : 'rgba(251,191,36,0.2)';
              const iconColor = isRed ? 'var(--negative)' : 'var(--warning)';
              return (
                <div key={i} className="anomaly-flag" style={{ background: bg, border: `1px solid ${border}` }}>
                  <span style={{ color: iconColor, flexShrink: 0, marginTop: '1px' }}><IconAlert /></span>
                  <div>
                    <div style={{ fontSize: '0.85rem', fontWeight: 600, marginBottom: '3px' }}>{a.msg}</div>
                    <div style={{ fontSize: '0.78rem', color: 'var(--text-secondary)' }}>Suggested action: {a.action}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// VIEW: BANK DETAIL
// ═══════════════════════════════════════════════════════════════════════════════
function BankDetailView({ bank, theme }) {
  const cc = chartC(theme);
  const activeDealers = bank.dealers.filter(d => d.jan.c > 0 || d.dec.c > 0);
  const inactiveDealers = bank.dealers.filter(d => d.jan.c === 0 && d.dec.c === 0);

  return (
    <div>
      <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap', marginBottom: '32px' }}>
        <KPICard icon={<IconDollar />} label="Financed Volume" value={fmtK(bank.jan.financed)} current={bank.jan.financed} previous={bank.dec.financed} />
        <KPICard icon={<IconChart />} label="Contracts" value={fmtNum(bank.jan.contracts)} current={bank.jan.contracts} previous={bank.dec.contracts} />
        <KPICard icon={<IconTarget />} label="Retail Penetration" value={fmtPct(bank.jan.pctRetail)} current={bank.jan.pctRetail} previous={bank.dec.pctRetail} />
        <KPICard icon={<IconTrendUp />} label="Current Tier Payout" value={fmt(bank.tier.currentPayout)} subValue={bank.tier.current} />
      </div>

      {bank.tier.nextTier !== "n/a" && (
        <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)', marginBottom: '24px' }}>
          <SectionTitle subtitle={`Progress toward ${bank.tier.nextTier} tier`}>Tier Progress</SectionTitle>
          <div style={{ display: 'flex', alignItems: 'center', gap: '16px', marginBottom: '12px' }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
                <span style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>{bank.tier.current} — {fmt(bank.tier.currentPayout)}/contract</span>
                <span style={{ fontSize: '0.8rem', color: 'var(--accent)' }}>{bank.tier.nextTier} — {fmt(bank.tier.nextPayout)}/contract</span>
              </div>
              <div style={{ height: '10px', background: 'var(--bg-surface-3)', borderRadius: '5px', overflow: 'hidden' }}>
                <div style={{ height: '100%', width: `${Math.min((bank.tier.annualProjected / (bank.tier.annualProjected + bank.tier.neededForNext)) * 100, 100)}%`, background: 'linear-gradient(90deg, var(--accent), #9BDB00)', borderRadius: '5px', transition: 'width 0.6s ease' }} />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '6px' }}>
                <span style={{ fontSize: '0.75rem', color: 'var(--text-tertiary)' }}>Projected: {fmtK(bank.tier.annualProjected)}</span>
                <span style={{ fontSize: '0.75rem', color: 'var(--text-tertiary)' }}>Need: {fmtK(bank.tier.neededForNext)} more</span>
              </div>
            </div>
          </div>
        </div>
      )}

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '24px' }}>
        <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)' }}>
          <SectionTitle>Dealer Volume Comparison</SectionTitle>
          <div style={{ height: '320px' }}>
            <ChartCanvas id={`dlrChart-${bank.name}-${theme}`} deps={[bank.name, theme]} initChart={(ctx) => new Chart(ctx, {
              type: 'bar',
              data: {
                labels: activeDealers.map(d => d.name),
                datasets: [
                  { label: 'Jan 2026', data: activeDealers.map(d => d.jan.v), backgroundColor: '#CCFF00', borderRadius: 4 },
                  { label: 'Dec 2025', data: activeDealers.map(d => d.dec.v), backgroundColor: 'rgba(204,255,0,0.25)', borderRadius: 4 },
                ]
              },
              options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'top', labels: { color: cc.legend, font: { family: 'Inter', size: 11 } } } },
                scales: {
                  x: { ticks: { color: cc.tickDim, font: { family: 'Inter', size: 10 }, callback: v => fmtK(v) }, grid: { color: cc.grid } },
                  y: { ticks: { color: cc.tick, font: { family: 'Inter', size: 11 } }, grid: { display: false } }
                }
              }
            })} />
          </div>
        </div>
        <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)', overflow: 'auto' }}>
          <SectionTitle>Dealer Detail</SectionTitle>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.8rem' }}>
            <thead>
              <tr style={{ borderBottom: '1px solid var(--border)' }}>
                <th style={thStyle}>Dealer</th>
                <th style={{...thStyle, textAlign: 'right'}}>Jan Contracts</th>
                <th style={{...thStyle, textAlign: 'right'}}>Jan Volume</th>
                <th style={{...thStyle, textAlign: 'right'}}>Dec Contracts</th>
                <th style={{...thStyle, textAlign: 'right'}}>Trend</th>
              </tr>
            </thead>
            <tbody>
              {bank.dealers.sort((a,b) => b.jan.v - a.jan.v).map(d => (
                <tr key={d.name} style={{ borderBottom: '1px solid rgba(51,51,51,0.5)' }}>
                  <td style={tdStyle}>{d.name}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{d.jan.c}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{d.jan.v > 0 ? fmtK(d.jan.v) : '—'}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>{d.dec.c}</td>
                  <td style={{...tdStyle, textAlign: 'right'}}>
                    {d.jan.c === 0 && d.dec.c === 0 ? <span style={{ color: 'var(--text-tertiary)' }}>No activity</span> :
                     d.jan.c === 0 && d.dec.c > 0 ? <span style={{ color: 'var(--negative)', fontWeight: 600 }}>Dropped</span> :
                     d.dec.c === 0 && d.jan.c > 0 ? <span style={{ color: 'var(--positive)', fontWeight: 600 }}>New</span> :
                     <DeltaBadge current={d.jan.v} previous={d.dec.v} />}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {inactiveDealers.length > 0 && (
        <div style={{ background: 'rgba(251,191,36,0.06)', borderRadius: '12px', padding: '20px 24px', border: '1px solid rgba(251,191,36,0.15)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}>
            <span style={{ color: 'var(--warning)' }}><IconAlert /></span>
            <span style={{ fontSize: '0.85rem', fontWeight: 600, color: 'var(--warning)' }}>Inactive Rooftops — {inactiveDealers.length} dealers with zero activity</span>
          </div>
          <p style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>
            {inactiveDealers.map(d => d.name).join(', ')} — Consider outreach to re-engage these locations with {bank.name}.
          </p>
        </div>
      )}
    </div>
  );
}

// VIEW: DEALER REPORT
// ═══════════════════════════════════════════════════════════════════════════════
function DealerReportView({ theme }) {
  const cc = chartC(theme);
  const allDealers = [...new Set(BANK_DATA.flatMap(b => b.dealers.map(d => d.name)))].sort();
  const dealerMatrix = allDealers.map(dName => {
    const row = { name: dName, banks: {} };
    let totalJan = 0, totalDec = 0;
    BANK_DATA.forEach(bank => {
      const d = bank.dealers.find(dd => dd.name === dName);
      if (d) { row.banks[bank.name] = { jan: d.jan, dec: d.dec }; totalJan += d.jan.v; totalDec += d.dec.v; }
    });
    row.totalJan = totalJan; row.totalDec = totalDec;
    return row;
  });

  return (
    <div>
      <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)', marginBottom: '24px', overflow: 'auto' }}>
        <SectionTitle subtitle="Financed volume across all lender partners by rooftop">Dealer Performance Matrix</SectionTitle>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.78rem' }}>
          <thead>
            <tr style={{ borderBottom: '2px solid var(--border)' }}>
              <th style={thStyle}>Dealer</th>
              {BANK_DATA.map(b => <th key={b.name} style={{...thStyle, textAlign: 'center'}} colSpan="2">{b.name}</th>)}
              <th style={{...thStyle, textAlign: 'right'}}>Total Jan</th>
              <th style={{...thStyle, textAlign: 'right'}}>Trend</th>
            </tr>
            <tr style={{ borderBottom: '1px solid var(--border)' }}>
              <th style={thStyle}></th>
              {BANK_DATA.map(b => (
                <React.Fragment key={b.name}>
                  <th style={{...thStyle, textAlign: 'right', fontSize: '0.7rem', color: 'var(--text-tertiary)'}}>Contracts</th>
                  <th style={{...thStyle, textAlign: 'right', fontSize: '0.7rem', color: 'var(--text-tertiary)'}}>Volume</th>
                </React.Fragment>
              ))}
              <th style={thStyle}></th><th style={thStyle}></th>
            </tr>
          </thead>
          <tbody>
            {dealerMatrix.sort((a,b) => b.totalJan - a.totalJan).map(row => (
              <tr key={row.name} style={{ borderBottom: '1px solid rgba(51,51,51,0.4)' }}>
                <td style={{...tdStyle, fontWeight: 600}}>{row.name}</td>
                {BANK_DATA.map(b => {
                  const bd = row.banks[b.name];
                  return (<React.Fragment key={b.name}><td style={{...tdStyle, textAlign: 'right'}}>{bd ? (bd.jan.c || '—') : '—'}</td><td style={{...tdStyle, textAlign: 'right'}}>{bd && bd.jan.v > 0 ? fmtK(bd.jan.v) : '—'}</td></React.Fragment>);
                })}
                <td style={{...tdStyle, textAlign: 'right', fontWeight: 600, color: row.totalJan > 0 ? 'var(--accent)' : 'var(--text-tertiary)'}}>{row.totalJan > 0 ? fmtK(row.totalJan) : '—'}</td>
                <td style={{...tdStyle, textAlign: 'right'}}>{row.totalJan === 0 && row.totalDec === 0 ? <span style={{ color: 'var(--warning)', fontSize: '0.7rem' }}>No activity</span> : <DeltaBadge current={row.totalJan} previous={row.totalDec} />}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ background: 'var(--bg-surface)', borderRadius: '12px', padding: '24px', border: '1px solid var(--border)' }}>
        <SectionTitle>Dealer Volume Heatmap</SectionTitle>
        <div style={{ height: '360px' }}>
          <ChartCanvas id={`dealerHeatmap-${theme}`} deps={[theme]} initChart={(ctx) => new Chart(ctx, {
            type: 'bar',
            data: {
              labels: dealerMatrix.sort((a,b) => b.totalJan - a.totalJan).map(d => d.name),
              datasets: BANK_DATA.map((b, i) => ({
                label: b.name,
                data: dealerMatrix.sort((a,b2) => b2.totalJan - a.totalJan).map(d => d.banks[b.name]?.jan?.v || 0),
                backgroundColor: ['#CCFF00', '#00D4FF', '#FF6B6B'][i],
                borderRadius: 2
              }))
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              plugins: { legend: { position: 'top', labels: { color: cc.legend, font: { family: 'Inter', size: 11 } } } },
              scales: {
                x: { stacked: true, ticks: { color: cc.tick, font: { family: 'Inter', size: 10 } }, grid: { display: false } },
                y: { stacked: true, ticks: { color: cc.tickDim, font: { family: 'Inter', size: 10 }, callback: v => fmtK(v) }, grid: { color: cc.grid } }
              }
            }
          })} />
        </div>
      </div>
    </div>
  );
}

// VIEW: DEALER RANKING (ESPN-style standings)
// ═══════════════════════════════════════════════════════════════════════════════
function DealerRankingView({ excludeSubvented, selectedGroup, role }) {
  const allStats = DEALER_GROUPS.map(g => computeGroupStats(g, excludeSubvented)).sort((a, b) => b.penetration - a.penetration);
  allStats.forEach((g, i) => g.rank = i + 1);

  const totalExcluded = allStats.reduce((s, g) => s + g.excludedCount, 0);

  // Determine which groups to show
  const isFiltered = role === 'groupManager' || role === 'storeManager';
  const displayStats = isFiltered ? allStats.filter(g => g.name === selectedGroup) : allStats;

  return (
    <div>
      {excludeSubvented && totalExcluded > 0 && (
        <div style={{ background: 'rgba(251,191,36,0.08)', border: '1px solid rgba(251,191,36,0.2)', borderRadius: '10px', padding: '10px 16px', marginBottom: '16px', fontSize: '0.8rem', color: 'var(--warning)' }}>
          Subvented deals excluded — {totalExcluded} deals across all groups
        </div>
      )}

      {displayStats.map(g => {
        const aboveTarget = g.penetration >= 0.15;
        return (
          <div key={g.name} className="ranking-card" style={{ background: 'var(--bg-surface)', borderRadius: '16px', padding: '24px', border: '1px solid var(--border)', marginBottom: '16px' }}>
            {/* Header: Rank + Group Name */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '20px' }}>
              <div style={{ fontSize: '0.85rem', fontWeight: 700, color: 'var(--accent)' }}>
                #{g.rank} of {allStats.length}
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: '1.1rem', fontWeight: 700 }}>{g.name}</div>
                <div style={{ fontSize: '0.75rem', color: 'var(--text-secondary)' }}>{g.rooftops} rooftops</div>
              </div>
            </div>

            {/* Big Penetration Number */}
            <div style={{ marginBottom: '20px' }}>
              <div className="ranking-number" style={{ fontSize: '2.8rem', fontWeight: 800, letterSpacing: '-0.03em', lineHeight: 1 }}>
                {fmtPct(g.penetration)}
              </div>
              <div style={{ fontSize: '0.7rem', fontWeight: 600, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.08em', marginTop: '4px' }}>
                Penetration
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: '4px', marginTop: '6px', fontSize: '0.8rem', fontWeight: 600, color: aboveTarget ? 'var(--positive)' : 'var(--negative)' }}>
                {aboveTarget ? <IconArrowUp /> : <IconArrowDown />}
                {aboveTarget ? 'Above' : 'Below'} 15% target
              </div>
            </div>

            {/* Excluded deals note */}
            {excludeSubvented && g.excludedCount > 0 && (
              <div style={{ fontSize: '0.75rem', color: 'var(--text-tertiary)', marginBottom: '12px' }}>
                ({g.excludedCount} deals excluded)
              </div>
            )}

            {/* Per-Bank Tier Cards */}
            {Object.entries(g.bankStats).map(([bankName, bs]) => {
              const tier = bs.tier;
              const projTier = bs.projectedTier;
              const isTopTier = tier.next === null;
              const projectedBetter = projTier.tierIndex > tier.tierIndex;

              return (
                <div key={bankName} style={{ background: 'var(--bg-surface-2)', borderRadius: '10px', padding: '16px', marginTop: '12px' }}>
                  <div style={{ fontWeight: 700, fontSize: '0.9rem', marginBottom: '8px' }}>{bankName}</div>

                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '0.8rem', color: 'var(--text-secondary)' }}>
                    <span>Tier {tier.tierIndex + 1} of {tier.totalTiers} · {fmt(tier.currentPayout)}/contract</span>
                  </div>

                  {!isTopTier && tier.next && (
                    <div style={{ fontSize: '0.78rem', color: 'var(--text-tertiary)', marginTop: '4px' }}>
                      Next: Tier {tier.tierIndex + 2} · {fmt(tier.nextPayout)}
                    </div>
                  )}
                  {isTopTier && (
                    <div style={{ fontSize: '0.78rem', color: 'var(--positive)', fontWeight: 600, marginTop: '4px' }}>
                      Top Tier Achieved
                    </div>
                  )}

                  {/* Progress Bar */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginTop: '8px' }}>
                    <div className="tier-progress-bar" style={{ flex: 1 }}>
                      <div className="tier-progress-fill" style={{ width: `${Math.round(bs.progress * 100)}%` }} />
                    </div>
                    <span style={{ fontSize: '0.75rem', color: 'var(--text-secondary)', minWidth: '36px', textAlign: 'right' }}>
                      {Math.round(bs.progress * 100)}%
                    </span>
                  </div>

                  {/* Projection Line */}
                  <div style={{ fontSize: '0.78rem', marginTop: '8px', color: projectedBetter ? 'var(--positive)' : 'var(--text-secondary)' }}>
                    Projected: {fmtK(bs.projectedMonthV * 12)} {projectedBetter ? (
                      <span style={{ fontWeight: 600 }}>&#8593; Tier {projTier.tierIndex + 1}</span>
                    ) : (
                      <span>&#8594; Tier {projTier.tierIndex + 1}</span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}

      {/* Best Practices Sidebar at Bottom */}
      <BestPracticesSidebar allStats={allStats} />
    </div>
  );
}

// APP COMPONENT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [activeView, setActiveView] = useState('ranking');
  const [selectedBank, setSelectedBank] = useState(null);
  const [selectedDealer, setSelectedDealer] = useState('Dealer #1');
  const [theme, setTheme] = useState('dark');
  const [role, setRole] = useState('admin');
  const [selectedGroup, setSelectedGroup] = useState('DEALER Motor Group');
  const [excludeSubvented, setExcludeSubvented] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  const viewTitles = {
    ranking: { title: 'Dealer Rankings', sub: 'Lender penetration standings across all dealer groups' },
    myDealer: { title: 'My Dealership', sub: `${selectedDealer} — lender activity and earnings` },
    yourMoney: { title: 'Your Money', sub: 'Tier-based earnings and opportunity analysis' },
    overview: { title: 'Group Overview', sub: `${DEALER_GROUP} — ${REPORT_PERIOD} performance summary` },
    fiEconomics: { title: 'F&I Economics', sub: 'Per-deal finance reserve and margin analysis' },
    dealerReport: { title: 'Dealer Report', sub: 'Rooftop-level performance across all lenders' },
  };

  // Nav items by role
  const navItems = useMemo(() => {
    const base = [
      { id: 'ranking', label: 'Ranking', icon: <IconTarget /> },
      { id: 'myDealer', label: 'My Dealership', icon: <IconStore /> },
      { id: 'yourMoney', label: 'Your Money', icon: <IconWallet /> },
    ];
    if (role === 'admin') {
      return [
        ...base,
        { type: 'divider', label: 'GROUP' },
        { id: 'overview', label: 'Overview', icon: <IconChart /> },
        { id: 'fiEconomics', label: 'F&I Economics', icon: <IconLayers /> },
        { id: 'dealerReport', label: 'Dealer Report', icon: <IconUsers /> },
        { type: 'divider', label: 'LENDERS' },
        ...BANK_DATA.map(b => ({ id: `bank-${b.name}`, label: b.name, icon: <IconDollar />, bank: b })),
      ];
    }
    // groupManager and storeManager get the base items only
    return base;
  }, [role]);

  const handleNav = (item) => {
    if (item.bank) {
      setSelectedBank(item.bank);
      setActiveView('bankDetail');
    } else {
      setActiveView(item.id);
      setSelectedBank(null);
    }
  };

  const currentTitle = selectedBank
    ? { title: selectedBank.name, sub: `Dealer-level performance and tier progress — ${REPORT_PERIOD}` }
    : (viewTitles[activeView] || { title: '', sub: '' });

  const selectStyle = { background: 'var(--bg-surface-2)', color: 'var(--text-primary)', border: '1px solid var(--border)', borderRadius: '8px', padding: '8px 12px', fontFamily: 'Inter', fontSize: '0.85rem', cursor: 'pointer', outline: 'none' };

  return (
    <div style={{ display: 'flex', minHeight: '100vh' }}>
      {/* ─── Sidebar ─── */}
      <aside style={{ width: '240px', background: 'var(--bg-surface)', borderRight: '1px solid var(--border)', padding: '24px 16px', display: 'flex', flexDirection: 'column', gap: '4px', flexShrink: 0 }}>
        {/* Logo */}
        <div style={{ padding: '0 8px 20px', borderBottom: '1px solid var(--border)', marginBottom: '12px' }}>
          <div style={{ fontSize: '1.1rem', fontWeight: 800, letterSpacing: '-0.02em' }}>
            <span style={{ color: 'var(--accent)' }}>Auto</span>Trust
          </div>
          <div style={{ fontSize: '0.7rem', color: 'var(--text-tertiary)', marginTop: '2px' }}>Dealer Alliance Platform</div>
        </div>

        {navItems.map((item, i) => {
          if (item.type === 'divider') {
            return (
              <div key={item.label} style={{ fontSize: '0.65rem', fontWeight: 600, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.08em', padding: '16px 8px 6px' }}>
                {item.label}
              </div>
            );
          }
          const isActive = item.bank ? (activeView === 'bankDetail' && selectedBank?.name === item.bank.name) : activeView === item.id;
          return (
            <button
              key={item.id}
              onClick={() => handleNav(item)}
              style={{
                display: 'flex', alignItems: 'center', gap: '10px',
                padding: '10px 12px', borderRadius: '8px', border: 'none',
                background: isActive ? 'var(--accent-dim)' : 'transparent',
                color: isActive ? 'var(--accent)' : 'var(--text-secondary)',
                fontFamily: 'Inter', fontSize: '0.85rem', fontWeight: isActive ? 600 : 400,
                cursor: 'pointer', width: '100%', textAlign: 'left',
                transition: 'all 0.15s ease',
              }}
            >
              {item.icon}
              {item.label}
            </button>
          );
        })}
      </aside>

      {/* ─── Main Content ─── */}
      <main style={{ flex: 1, overflow: 'auto' }}>
        {/* Header Bar */}
        <header style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px 32px', borderBottom: '1px solid var(--border)', background: 'var(--bg-surface)', position: 'sticky', top: 0, zIndex: 10 }}>
          <div>
            <h1 style={{ fontSize: '1.15rem', fontWeight: 700, letterSpacing: '-0.01em' }}>{currentTitle.title}</h1>
            <p style={{ fontSize: '0.78rem', color: 'var(--text-secondary)', marginTop: '1px' }}>{currentTitle.sub}</p>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
            {/* Role Selector */}
            <select value={role} onChange={e => setRole(e.target.value)} style={selectStyle}>
              <option value="admin">AutoTrust Admin</option>
              <option value="groupManager">Group Manager</option>
              <option value="storeManager">Store Manager</option>
            </select>

            {/* Group Selector (non-admin only) */}
            {role !== 'admin' && (
              <select value={selectedGroup} onChange={e => setSelectedGroup(e.target.value)} style={selectStyle}>
                {DEALER_GROUPS.map(g => <option key={g.name} value={g.name}>{g.name}</option>)}
              </select>
            )}

            {/* Subvention Toggle */}
            <label style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '0.75rem', color: 'var(--text-secondary)', cursor: 'pointer' }}>
              <input type="checkbox" checked={excludeSubvented} onChange={e => setExcludeSubvented(e.target.checked)} style={{ accentColor: 'var(--accent)' }} />
              Exclude Subvented
            </label>

            {/* Theme Toggle */}
            <button
              onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
              style={{ background: 'var(--bg-surface-2)', border: '1px solid var(--border)', borderRadius: '8px', padding: '8px', cursor: 'pointer', color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
            >
              {theme === 'dark' ? <IconSun /> : <IconMoon />}
            </button>
          </div>
        </header>

        {/* Content */}
        <div style={{ padding: '32px' }}>
          {activeView === 'ranking' && <DealerRankingView excludeSubvented={excludeSubvented} selectedGroup={selectedGroup} role={role} />}
          {activeView === 'myDealer' && <MyDealershipView selectedDealer={selectedDealer} onDealerChange={setSelectedDealer} theme={theme} />}
          {activeView === 'yourMoney' && <YourMoneyView theme={theme} />}
          {activeView === 'overview' && <OverviewView theme={theme} excludeSubvented={excludeSubvented} />}
          {activeView === 'fiEconomics' && <FIEconomicsView theme={theme} />}
          {activeView === 'dealerReport' && <DealerReportView theme={theme} />}
          {activeView === 'bankDetail' && selectedBank && <BankDetailView bank={selectedBank} theme={theme} />}
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
